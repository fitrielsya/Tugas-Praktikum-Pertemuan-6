<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Penjualan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10 font-sans text-gray-800">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold mb-2 text-indigo-600">Sistem Inventaris</h1>
        <p class="text-gray-500 mb-8">Manajemen Data Barang</p>
        
        <div class="bg-indigo-50 p-5 rounded-lg mb-8">
            <input type="hidden" id="id-barang">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="nama" placeholder="Masukkan Nama Barang" class="flex-1 p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="harga" placeholder="Harga (Rp)" class="flex-1 p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="simpan()" id="btn-simpan" class="bg-indigo-600 text-white font-bold px-6 py-3 rounded hover:bg-indigo-700 transition">Simpan Data</button>
            </div>
        </div>

        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-100 text-gray-600">
                    <th class="p-3 border-b-2 font-semibold">Nama Barang</th>
                    <th class="p-3 border-b-2 font-semibold text-right">Harga</th>
                    <th class="p-3 border-b-2 font-semibold text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-isi">
                </tbody>
        </table>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
